<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mohizarbot — Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="mohizarbot"
            data-size="large"
            data-onauth="onTelegramAuth(user)"
            data-auth-url="/login/callback">
    </script>
</head>
<body>
<div class="login-container">
    <h1>mohizarbot Admin</h1>
    <p>Sign in with Telegram to access the admin panel.</p>
    <div id="telegram-widget"></div>
</div>
<script>
function onTelegramAuth(user) {
    var params = new URLSearchParams(user).toString();
    window.location.href = '/login/callback?' + params;
}
</script>
</body>
</html>
